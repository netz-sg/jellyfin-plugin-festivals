description: >
  Presents music festivals in Jellyfin. A "Festivals" library shows each festival
  (e.g. Rock am Ring) with a hero image and info; drilling in reveals the editions
  by year, and inside each year the recorded performances with artist information.
  Data is managed through the plugin's dashboard configuration page.

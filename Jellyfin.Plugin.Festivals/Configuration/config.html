<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Festivals</title>
</head>
<body>
<div id="FestivalsConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-select,emby-textarea">
    <div data-role="content">
        <div class="content-primary">

            <div class="verticalSection">
                <div class="sectionTitleContainer flex align-items-center">
                    <h2 class="sectionTitle" style="margin:0;">Festivals</h2>
                    <span style="flex:1;"></span>
                    <button is="emby-button" type="button" id="btnChangeFolder" class="raised" style="display:none;margin-left:1em;">
                        <span class="material-icons" aria-hidden="true">folder</span>&nbsp;<span id="folderLabel">Change folder</span>
                    </button>
                    <button is="emby-button" type="button" id="btnRescan" class="raised" style="display:none;margin-left:.6em;">
                        <span class="material-icons" aria-hidden="true">sync</span>&nbsp;<span>Rescan</span>
                    </button>
                </div>
            </div>

            <!-- SETUP STEP -->
            <div id="festSetup" class="verticalSection" style="display:none;">
                <p class="fieldDescription">
                    First, choose the library that contains your festival recordings. The plugin reads the
                    festivals, years and performances from there automatically.
                </p>
                <div class="selectContainer">
                    <label class="selectLabel" for="libSelect">Library</label>
                    <select is="emby-select" id="libSelect">
                        <option value="">— choose a library —</option>
                    </select>
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="pathInput">Folder path</label>
                    <input is="emby-input" type="text" id="pathInput" />
                    <div class="fieldDescription">
                        Or enter / browse a path. Tip: name the year folders <code>Season 2026</code>
                        (not just <code>2026</code>) so Jellyfin does not create a duplicate season.
                    </div>
                </div>
                <button is="emby-button" type="button" id="btnBrowse" class="raised">
                    <span class="material-icons" aria-hidden="true">search</span>&nbsp;<span>Browse</span>
                </button>
                <button is="emby-button" type="button" id="btnContinue" class="raised button-submit block" style="margin-top:1.5em;">
                    <span>Continue</span>
                </button>
            </div>

            <!-- MAIN EDITOR -->
            <div id="festRoot"></div>

            <div id="festSaveSection" class="verticalSection" style="display:none;margin-top:2em;">
                <button is="emby-button" type="button" id="btnSave" class="raised button-submit block">
                    <span>Save changes</span>
                </button>
                <div class="fieldDescription" id="festSaveHint" style="text-align:center;margin-top:.6em;"></div>
            </div>

        </div>
    </div>

<style>
    #FestivalsConfigPage .content-primary { max-width: 960px; margin: 0 auto; }
    .festBlock { padding: 1.4em 0; border-top: 1px solid rgba(255,255,255,.12); }
    .festName { margin: 0 0 .8em; font-size: 1.4em; font-weight: 600; }
    .imgRow { display: flex; align-items: center; gap: 1em; margin: .7em 0; }
    .imgThumb { display: inline-block; width: 132px; height: 74px; border-radius: 4px;
        background: #101418 center / cover no-repeat; flex: 0 0 auto;
        border: 1px solid rgba(255,255,255,.1); }
    .imgThumb.sq { width: 64px; height: 64px; }
    .imgMeta { display: flex; flex-direction: column; gap: .35em; }
    .imgMeta .lbl { font-size: .85em; opacity: .7; }
    .twoCol { display: flex; gap: 1.2em; flex-wrap: wrap; }
    .twoCol > * { flex: 1; min-width: 220px; }
    .yearBlock { margin: .4em 0; }
    .yearHead { display: flex; align-items: center; gap: .5em; cursor: pointer;
        padding: .7em 0; border-top: 1px solid rgba(255,255,255,.06); user-select: none; }
    .yearChevron { transition: transform .2s; opacity: .6; }
    .yearBlock.open .yearChevron { transform: rotate(90deg); }
    .yearTitle { font-size: 1.1em; font-weight: 600; }
    .yearCount { opacity: .5; font-size: .85em; margin-left: .4em; }
    .yearBody { display: none; padding: .3em 0 .8em 1.4em; }
    .yearBlock.open .yearBody { display: block; }
    .recRow { display: flex; gap: 1.1em; padding: 1em 0; border-top: 1px solid rgba(255,255,255,.06); }
    .recThumbWrap { display: flex; flex-direction: column; align-items: center; gap: .4em; flex: 0 0 auto; }
    .recFields { flex: 1; min-width: 0; }
    .fileTag { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .75em;
        opacity: .45; margin: .1em 0 .4em; word-break: break-all; }
    .miniBtn { padding: .3em .6em !important; min-width: 0 !important; font-size: .85em; }
    .festEmpty { padding: 2.5em .5em; opacity: .8; }
    .festEmpty code { background: rgba(255,255,255,.1); padding: .1em .45em; border-radius: 4px; }
    .diagBox { margin-top: 1.4em; background: rgba(255,255,255,.04);
        border: 1px solid rgba(255,255,255,.1); border-radius: 6px; padding: 1em 1.2em; font-size: .9em; }
    .diagRow { display: flex; justify-content: space-between; padding: .25em 0;
        border-bottom: 1px solid rgba(255,255,255,.06); }
    .diagBox ul { margin: .3em 0 0; padding-left: 1.2em; opacity: .8; }
    .diagBox li { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .82em; word-break: break-all; }
</style>

<script type="text/javascript">
(function () {
    var page, db = { Festivals: [] }, currentPath = '', currentLibId = '';

    function imageUrl(name){ return name ? ApiClient.getUrl('Festivals/Images/' + name) : ''; }
    function esc(v){
        if (v === null || v === undefined) { return ''; }
        return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function splitList(v){ return (v||'').split(',').map(function(s){return s.trim();}).filter(Boolean); }
    function show(id, on){ var el = page.querySelector(id); if (el) { el.style.display = on ? '' : 'none'; } }

    // ---- views ------------------------------------------------------------

    function showSetup() {
        show('#festSetup', true);
        show('#festRoot', false);
        show('#festSaveSection', false);
        show('#btnChangeFolder', false);
        show('#btnRescan', false);
        Dashboard.showLoadingMsg();
        ApiClient.getJSON(ApiClient.getUrl('Festivals/Libraries')).then(function (libs) {
            var sel = page.querySelector('#libSelect');
            sel.innerHTML = '<option value="">— choose a library —</option>' +
                (libs || []).map(function (l) {
                    return '<option value="' + esc(l.Id) + '" data-path="' + esc(l.Path) + '">' + esc(l.Name) + ' — ' + esc(l.Path) + '</option>';
                }).join('');
            if (currentLibId) { sel.value = currentLibId; }
            page.querySelector('#pathInput').value = currentPath || '';
            Dashboard.hideLoadingMsg();
        }).catch(function () { Dashboard.hideLoadingMsg(); });
    }

    function showMain() {
        show('#festSetup', false);
        show('#festRoot', true);
        show('#festSaveSection', true);
        show('#btnChangeFolder', true);
        show('#btnRescan', true);
        page.querySelector('#folderLabel').textContent = 'Change folder';
        loadTree();
    }

    // ---- markup -----------------------------------------------------------

    function imgRow(label, current, kind, square) {
        var url = current ? imageUrl(current) : '';
        return '' +
        '<div class="imgRow" data-img="' + kind + '">' +
            '<input type="hidden" class="imgValue" value="' + esc(current) + '">' +
            '<span class="imgThumb' + (square ? ' sq' : '') + (url ? ' has' : '') + '"' +
                (url ? ' style="background-image:url(\'' + url + '\')"' : '') + '></span>' +
            '<div class="imgMeta">' +
                '<span class="lbl">' + esc(label) + '</span>' +
                '<label is="emby-button" class="raised miniBtn"><span>Upload</span>' +
                    '<input type="file" accept="image/*" class="imgUpload" style="display:none;"></label>' +
            '</div>' +
        '</div>';
    }

    function recRow(rec) {
        return '' +
        '<div class="recRow">' +
            '<div class="recThumbWrap" data-img="artist">' +
                '<input type="hidden" class="imgValue" value="' + esc(rec.ArtistImage) + '">' +
                '<span class="imgThumb sq"' + (rec.ArtistImage ? ' style="background-image:url(\'' + imageUrl(rec.ArtistImage) + '\')"' : '') + '></span>' +
                '<label is="emby-button" class="raised miniBtn"><span>Photo</span>' +
                    '<input type="file" accept="image/*" class="imgUpload" style="display:none;"></label>' +
            '</div>' +
            '<div class="recFields">' +
                '<div class="inputContainer"><input is="emby-input" type="text" class="f-artist" value="' + esc(rec.Artist) + '" placeholder="Artist" /></div>' +
                '<div class="fileTag">' + esc(rec.FileMatch) + '</div>' +
                '<div class="twoCol">' +
                    '<div class="inputContainer"><input is="emby-input" type="text" class="f-stage" value="' + esc(rec.Stage) + '" placeholder="Stage" /></div>' +
                    '<div class="inputContainer"><input is="emby-input" type="text" class="f-date" value="' + esc(rec.Date) + '" placeholder="Date / time" /></div>' +
                '</div>' +
                '<div class="inputContainer"><input is="emby-input" type="text" class="f-genres" value="' + esc((rec.Genres||[]).join(', ')) + '" placeholder="Genres (comma separated)" /></div>' +
                '<div class="inputContainer"><textarea is="emby-textarea" class="f-bio" rows="2" placeholder="Bio / description">' + esc(rec.Bio) + '</textarea></div>' +
                '<div class="inputContainer"><textarea is="emby-textarea" class="f-setlist" rows="2" placeholder="Setlist">' + esc(rec.Setlist) + '</textarea></div>' +
            '</div>' +
        '</div>';
    }

    function yearBlock(year) {
        var recs = (year.Recordings||[]).map(recRow).join('');
        return '' +
        '<div class="yearBlock" data-year="' + esc(year.Year) + '">' +
            '<div class="yearHead">' +
                '<span class="material-icons yearChevron">chevron_right</span>' +
                '<span class="yearTitle">' + esc(year.Year) + '</span>' +
                '<span class="yearCount">' + (year.Recordings||[]).length + ' performances</span>' +
            '</div>' +
            '<div class="yearBody">' +
                imgRow('Edition poster', year.Poster, 'yearPoster', false) +
                '<div class="inputContainer"><label class="inputLabel">Edition description</label>' +
                    '<input is="emby-input" type="text" class="y-desc" value="' + esc(year.Description) + '" /></div>' +
                '<div class="recList">' + recs + '</div>' +
            '</div>' +
        '</div>';
    }

    function festBlock(f) {
        var years = (f.Years||[]).map(yearBlock).join('');
        return '' +
        '<div class="festBlock" data-fest="' + esc(f.Name) + '">' +
            '<h2 class="festName">' + esc(f.Name) + '</h2>' +
            imgRow('Hero / backdrop', f.HeroImage, 'hero', false) +
            imgRow('Poster (cover)', f.Poster, 'poster', false) +
            '<div class="twoCol">' +
                '<div class="inputContainer"><label class="inputLabel">Location</label>' +
                    '<input is="emby-input" type="text" class="f-location" value="' + esc(f.Location) + '" /></div>' +
                '<div class="inputContainer"><label class="inputLabel">Genres (comma separated)</label>' +
                    '<input is="emby-input" type="text" class="f-fgenres" value="' + esc((f.Genres||[]).join(', ')) + '" /></div>' +
            '</div>' +
            '<div class="inputContainer"><label class="inputLabel">Description</label>' +
                '<textarea is="emby-textarea" class="f-desc" rows="3">' + esc(f.Description) + '</textarea></div>' +
            '<div class="yearList">' + years + '</div>' +
        '</div>';
    }

    function emptyState(d) {
        var diag = '';
        if (d) {
            var samples = (d.SampleSeriesPaths || []).map(function (p) { return '<li>' + esc(p) + '</li>'; }).join('');
            var libs = (d.Libraries || []).map(function (l) { return '<li>' + esc(l.Name) + ' — ' + esc(l.Path) + '</li>'; }).join('');
            diag = '<div class="diagBox">' +
                '<div class="diagRow"><span>Series found in total</span><b>' + d.TotalSeries + '</b></div>' +
                '<div class="diagRow"><span>Matched by your selection</span><b>' + d.MatchedSeries + '</b></div>' +
                (samples ? '<div style="margin-top:.6em;opacity:.6;">Where your series actually are:</div><ul>' + samples + '</ul>' : '') +
                (libs ? '<div style="margin-top:.6em;opacity:.6;">Available libraries:</div><ul>' + libs + '</ul>' : '') +
            '</div>';
        }
        return '<div class="festEmpty">' +
            '<h3>No festivals found in this folder</h3>' +
            '<p class="fieldDescription">Either the selection points at the wrong library, or Jellyfin has not ' +
            'scanned it yet (Shows library, layout <code>Festival / Season 2026 / Artist.mkv</code>).</p>' +
            '<p class="fieldDescription">Use <strong>Change folder</strong> or <strong>Rescan</strong>.</p>' +
            diag + '</div>';
    }

    function renderEmpty(root) {
        root.innerHTML = emptyState(null);
        ApiClient.getJSON(ApiClient.getUrl('Festivals/Diagnostics'))
            .then(function (d) { root.innerHTML = emptyState(d); })
            .catch(function () {});
    }

    function render() {
        var root = page.querySelector('#festRoot');
        if (!db.Festivals || !db.Festivals.length) { renderEmpty(root); return; }
        root.innerHTML = db.Festivals.map(festBlock).join('');
        root.querySelectorAll('.festBlock').forEach(function (fb) {
            var first = fb.querySelector('.yearBlock');
            if (first) { first.classList.add('open'); }
        });
    }

    // ---- DOM -> state -----------------------------------------------------

    function val(scope, sel){ var el = scope.querySelector(sel); return el ? el.value : ''; }
    function imgOf(scope, kind){
        if (!scope) { return null; }
        var sel = '[data-img="' + kind + '"]';
        var f = (scope.matches && scope.matches(sel)) ? scope : scope.querySelector(sel);
        if (!f) { return null; }
        var v = f.querySelector('.imgValue');
        return v && v.value ? v.value : null;
    }

    function syncFromDom() {
        var fests = [];
        page.querySelectorAll('#festRoot > .festBlock').forEach(function (fb) {
            var festival = {
                Name: fb.dataset.fest,
                Location: val(fb, '.f-location') || null,
                Description: val(fb, '.f-desc') || null,
                Genres: splitList(val(fb, '.f-fgenres')),
                HeroImage: imgOf(fb, 'hero'),
                Poster: imgOf(fb, 'poster'),
                Years: []
            };
            fb.querySelectorAll('.yearList > .yearBlock').forEach(function (yb) {
                var year = {
                    Year: parseInt(yb.dataset.year, 10) || 0,
                    Description: val(yb, '.y-desc') || null,
                    Poster: imgOf(yb, 'yearPoster'),
                    Recordings: []
                };
                yb.querySelectorAll('.recList > .recRow').forEach(function (rr) {
                    year.Recordings.push({
                        FileMatch: rr.querySelector('.fileTag').textContent,
                        Artist: val(rr, '.f-artist'),
                        Stage: val(rr, '.f-stage') || null,
                        Date: val(rr, '.f-date') || null,
                        Genres: splitList(val(rr, '.f-genres')),
                        Bio: val(rr, '.f-bio') || null,
                        Setlist: val(rr, '.f-setlist') || null,
                        ArtistImage: imgOf(rr, 'artist')
                    });
                });
                festival.Years.push(year);
            });
            fests.push(festival);
        });
        db.Festivals = fests;
    }

    // ---- events -----------------------------------------------------------

    function onClick(e) {
        var head = e.target.closest('.yearHead');
        if (head) { head.parentElement.classList.toggle('open'); }
    }

    function onChange(e) {
        var input = e.target;
        if (input.id === 'libSelect') {
            currentLibId = input.value || '';
            var opt = input.options[input.selectedIndex];
            if (opt && opt.dataset && opt.dataset.path) { page.querySelector('#pathInput').value = opt.dataset.path; }
            return;
        }
        if (!input.classList || !input.classList.contains('imgUpload') || !input.files || !input.files.length) { return; }
        var wrap = input.closest('[data-img]');
        var fd = new FormData();
        fd.append('file', input.files[0]);
        Dashboard.showLoadingMsg();
        fetch(ApiClient.getUrl('Festivals/Images'), {
            method: 'POST',
            body: fd,
            headers: { 'Authorization': 'MediaBrowser Token="' + ApiClient.accessToken() + '"' },
            credentials: 'same-origin'
        }).then(function (r) {
            if (!r.ok) { return r.text().then(function (t) { throw new Error('HTTP ' + r.status + (t ? ' – ' + t : '')); }); }
            return r.json();
        }).then(function (res) {
            wrap.querySelector('.imgValue').value = res.fileName;
            var thumb = wrap.querySelector('.imgThumb');
            if (thumb) { thumb.style.backgroundImage = "url('" + imageUrl(res.fileName) + "')"; thumb.classList.add('has'); }
            input.value = '';
            Dashboard.hideLoadingMsg();
        }).catch(function (err) { Dashboard.hideLoadingMsg(); Dashboard.alert('Upload failed: ' + err.message); });
    }

    function browseFolder() {
        try {
            require(['directorybrowser'], function (directorybrowser) {
                var Ctor = directorybrowser && directorybrowser.default ? directorybrowser.default : directorybrowser;
                var picker = new Ctor();
                picker.show({
                    header: 'Select your festivals folder',
                    path: page.querySelector('#pathInput').value,
                    callback: function (path) {
                        if (path) { page.querySelector('#pathInput').value = path; currentLibId = ''; page.querySelector('#libSelect').value = ''; }
                        picker.close();
                    }
                });
            });
        } catch (err) {
            Dashboard.alert('Folder browser unavailable — please type the path manually.');
        }
    }

    function continueSetup() {
        var path = page.querySelector('#pathInput').value.trim();
        if (!path && !currentLibId) { Dashboard.alert('Please choose a library or enter a folder path.'); return; }
        Dashboard.showLoadingMsg();
        ApiClient.ajax({ type:'POST', url: ApiClient.getUrl('Festivals/Config'),
            data: JSON.stringify({ LibraryId: currentLibId, LibraryPath: path }), contentType:'application/json' })
        .then(function () { currentPath = path; Dashboard.hideLoadingMsg(); showMain(); })
        .catch(function () { Dashboard.hideLoadingMsg(); Dashboard.alert('Could not save the folder.'); });
    }

    function loadTree() {
        Dashboard.showLoadingMsg();
        ApiClient.getJSON(ApiClient.getUrl('Festivals/Tree')).then(function (res) {
            db = res && res.Festivals ? res : { Festivals: [] };
            render(); Dashboard.hideLoadingMsg();
        }).catch(function () { db = { Festivals: [] }; render(); Dashboard.hideLoadingMsg(); });
    }

    function save() {
        syncFromDom();
        Dashboard.showLoadingMsg();
        ApiClient.ajax({ type:'PUT', url: ApiClient.getUrl('Festivals'),
            data: JSON.stringify(db), contentType:'application/json' })
        .then(function () {
            Dashboard.hideLoadingMsg();
            var hint = page.querySelector('#festSaveHint');
            hint.textContent = 'Saved — refreshing metadata & images now. Reload the library in a moment.';
            setTimeout(function(){ hint.textContent=''; }, 8000);
        }).catch(function () { Dashboard.hideLoadingMsg(); Dashboard.alert('Save failed.'); });
    }

    function init() {
        Dashboard.showLoadingMsg();
        ApiClient.getJSON(ApiClient.getUrl('Festivals/Config')).then(function (cfg) {
            currentPath = (cfg && cfg.LibraryPath) ? cfg.LibraryPath : '';
            currentLibId = (cfg && cfg.LibraryId) ? cfg.LibraryId : '';
            Dashboard.hideLoadingMsg();
            if (currentLibId || currentPath) { showMain(); } else { showSetup(); }
        }).catch(function () { Dashboard.hideLoadingMsg(); showSetup(); });
    }

    document.querySelector('#FestivalsConfigPage').addEventListener('viewshow', function () {
        page = this;
        page.addEventListener('click', onClick);
        page.addEventListener('change', onChange);
        page.querySelector('#btnSave').addEventListener('click', save);
        page.querySelector('#btnRescan').addEventListener('click', loadTree);
        page.querySelector('#btnChangeFolder').addEventListener('click', showSetup);
        page.querySelector('#btnBrowse').addEventListener('click', browseFolder);
        page.querySelector('#btnContinue').addEventListener('click', continueSetup);
        page.querySelector('#pathInput').addEventListener('input', function () {
            currentLibId = ''; page.querySelector('#libSelect').value = '';
        });
        init();
    });
})();
</script>
</div>
</body>
</html>
